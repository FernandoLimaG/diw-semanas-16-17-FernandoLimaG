<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>

    <!-- Bootstrap CSS + Styles CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <main class="container">
        <div class="text-center mb-4">
            <h1>Cadastro de Contatos</h1>
            <hr>
        </div>

        <div id="mensagem"></div>

        <form id="contact-form">
            <div class="mb-3">
                <label for="name" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" placeholder="Digite o nome do contato" required>
                <br>

                <label for="phone" class="form-label">Telefone</label>
                <input type="tel" class="form-control" id="telefone" placeholder="Digite o telefone do contato" required>
                <br>
                
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Digite o email do contato">
                <br>
            </div>

            <!-- Botoes de Acao e edicao -->
            <button type="submit" class="btn btn-custom-green">Salvar</button>
           
            <hr>
            <br>
        </form>

        <!-- Voltar Homepage -->
         <div class="mt-3">
            <a href="index.html" class="btn btn-secondary">Página Inicial</a>
        </div>
    </main>

    <!-- Bootstrap JS Bundle + Scripts JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
